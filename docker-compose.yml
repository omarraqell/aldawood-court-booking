services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aldawood_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aldawood_booking
      JWT_SECRET: ${JWT_SECRET:-replace_me}
      API_PORT: "4000"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-owner@aldawood.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
    depends_on:
      postgres:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      BACKEND_API_URL: http://api:4000/api
      AGENT_PORT: "8000"
    depends_on:
      - api

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server-side calls (actions, api.ts) go through Docker network
      API_BASE_URL: http://api:4000/api
      # Client-side vars are baked at build time (see Dockerfile ARGs)
    depends_on:
      - api

volumes:
  postgres_data:
