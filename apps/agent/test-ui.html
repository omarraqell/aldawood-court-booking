<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aldawood Agent – Test Console</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #334155;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #38bdf8;
    }

    .config {
      display: flex;
      gap: 10px;
      margin-left: auto;
      align-items: center;
    }

    .config label {
      font-size: 12px;
      color: #94a3b8;
    }

    .config input {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      padding: 5px 10px;
      color: #e2e8f0;
      font-size: 13px;
      width: 160px;
    }

    .config input:focus {
      outline: none;
      border-color: #38bdf8;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 9999px;
      background: #1e3a5f;
      color: #38bdf8;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1d4ed8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-bottom-left-radius: 4px;
    }

    .msg.assistant[dir="rtl"] {
      text-align: right;
    }

    .msg.error {
      align-self: center;
      background: #7f1d1d;
      color: #fca5a5;
      font-size: 13px;
    }

    .typing {
      align-self: flex-start;
      padding: 10px 18px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      font-size: 14px;
      color: #94a3b8;
    }

    .typing span {
      animation: blink 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    footer {
      background: #1e293b;
      padding: 12px 20px;
      border-top: 1px solid #334155;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    #msgInput {
      flex: 1;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 14px;
      resize: none;
      height: 44px;
    }

    #msgInput:focus {
      outline: none;
      border-color: #38bdf8;
    }

    #sendBtn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #sendBtn:hover { background: #1d4ed8; }
    #sendBtn:disabled { background: #475569; cursor: not-allowed; }

    #clearBtn {
      background: transparent;
      color: #94a3b8;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 13px;
      cursor: pointer;
    }

    #clearBtn:hover { border-color: #94a3b8; color: #e2e8f0; }
  </style>
</head>
<body>

<header>
  <h1>Aldawood Booking Agent</h1>
  <span class="badge">Test Console</span>
  <div class="config">
    <div>
      <label>Phone</label><br />
      <input id="phoneInput" value="+962790000001" />
    </div>
    <div>
      <label>Agent URL</label><br />
      <input id="urlInput" value="http://localhost:8000" />
    </div>
  </div>
</header>

<div id="chat"></div>

<footer>
  <div class="input-row">
    <input id="msgInput" placeholder="Type a message..." autocomplete="off" />
    <button id="sendBtn">Send</button>
    <button id="clearBtn">Clear</button>
  </div>
</footer>

<script>
  const chat = document.getElementById("chat");
  const msgInput = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const clearBtn = document.getElementById("clearBtn");
  const phoneInput = document.getElementById("phoneInput");
  const urlInput = document.getElementById("urlInput");

  let conversationId = "";

  function isArabic(text) {
    return /[\u0600-\u06FF]/.test(text);
  }

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = text;
    if (role === "assistant" && isArabic(text)) {
      div.setAttribute("dir", "rtl");
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typing";
    div.innerHTML = "<span>.</span><span>.</span><span>.</span>";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function send() {
    const text = msgInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    msgInput.value = "";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(`${urlInput.value.replace(/\/+$/, "")}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          phone: phoneInput.value.trim(),
          conversation_id: conversationId || null,
        }),
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`${res.status}: ${errText}`);
      }

      const data = await res.json();
      conversationId = data.conversationId || conversationId;
      hideTyping();
      addMessage(data.message || "(no response)", "assistant");
    } catch (err) {
      hideTyping();
      addMessage(`Error: ${err.message}`, "error");
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  clearBtn.addEventListener("click", () => {
    chat.innerHTML = "";
    conversationId = "";
  });

  msgInput.focus();
</script>

</body>
</html>
